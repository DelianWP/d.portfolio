<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Del's Page | Delian Wahyu Pradana</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ░░░ PRELOADER ░░░ -->
  <div id="preloader">
    <div class="preloader-inner">
      <div class="preloader-count" id="preloader-count">000</div>
      <div class="preloader-name">
        <span class="preloader-name-main">DEL'S</span>
        <span class="preloader-name-sub">PORTFOLIO</span>
      </div>
      <div class="preloader-bar-wrap">
        <div class="preloader-bar" id="preloader-bar"></div>
      </div>
    </div>
    <div class="preloader-curtain curtain-gold" id="curtain-gold"></div>
    <div class="preloader-curtain curtain-bg"   id="curtain-bg"></div>
  </div>

  <!-- ░░░ CUSTOM CURSOR ░░░ -->
  <div class="cursor-ring" id="cursor-ring"></div>
  <div class="cursor-dot"  id="cursor-dot"></div>

  <!-- ░░░ HEADER ░░░ -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        Del<span class="logo-accent">'s</span> Page
      </a>
      <nav class="nav-desktop" id="nav-desktop">
        <a href="index.html"       class="nav-link active" data-page="home">Home</a>
        <a href="about.html"       class="nav-link"        data-page="about">About</a>
        <a href="experiences.html" class="nav-link"        data-page="experiences">Experiences</a>
        <a href="contact.html"     class="nav-link"        data-page="contact">Contact</a>
        <button class="theme-btn" id="theme-btn" aria-label="Toggle theme">
          <span class="theme-icon" id="theme-icon">☀</span>
        </button>
      </nav>
      <div class="nav-mobile-controls">
        <button class="theme-btn" id="theme-btn-mob" aria-label="Toggle theme">
          <span id="theme-icon-mob">☀</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobile-menu">
      <a href="index.html"       class="mob-link active">HOME</a>
      <a href="about.html"       class="mob-link">ABOUT</a>
      <a href="experiences.html" class="mob-link">EXPERIENCES</a>
      <a href="contact.html"     class="mob-link">CONTACT</a>
    </div>
  </header>

  <!-- ░░░ HOME PAGE ░░░ -->
  <main class="page-home">

    <!-- Background circles -->
    <div class="bg-circles" aria-hidden="true">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <div class="circle circle-3 spin"></div>
      <div class="glow-blob"></div>
    </div>

    <!-- Hero content -->
    <div class="hero-content" id="hero-content">

      <!-- Kolom Kiri: Teks & Tombol -->
      <div class="hero-left">
        <div class="hero-name-wrap">
          <div class="overflow-h">
            <h1 class="hero-name line1 reveal-up">Delian Wahyu</h1>
          </div>
          <div class="overflow-h">
            <h1 class="hero-name line2 italic reveal-up delay-1">Pradana</h1>
          </div>
        </div>

        <p class="hero-tagline reveal-fade delay-2">
          TELECOMMUNICATIONS ENGINEERING · EEPIS
        </p>

        <a href="about.html" class="cta-btn reveal-fade delay-3">
          <span class="cta-text">Here Me</span>
          <span class="cta-arrow">↗</span>
          <div class="cta-fill"></div>
        </a>
      </div>

      <!-- Kolom Kanan: Foto -->
      <div class="hero-right" id="hero-right">
        <div class="photo-wrap" id="photo-wrap">
          <div class="photo-frame interactive-photo" id="profile-photo-frame">
            <!-- Ganti dengan foto asli -->
            <img src="Img/Part2.png" alt="Delian Wahyu Pradana" id="profile-img">
          </div>
          <div class="orbit-dot"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- ░░░ FOOTER ░░░ -->
  <footer class="site-footer">
    <p class="footer-text">Delian Wahyu Pradana — ©<span id="year"></span></p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
